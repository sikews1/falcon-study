<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espanya - Mapa real interactiu</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="maps/jsvectormap.min.css">
    <style>
        .geo-nav { background: rgba(240,240,243, 0.85); backdrop-filter: blur(20px); padding: 12px 20px; display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; border-bottom: 1px solid var(--border-subtle); position: sticky; top: 0; z-index: 200; }
        [data-theme="dark"] .geo-nav { background: rgba(9, 9, 11, 0.75); }
        .geo-nav a { padding: 8px 16px; border-radius: var(--radius-full); color: var(--text-secondary); text-decoration: none; font-size: 0.82rem; font-weight: 500; }
        .geo-nav a:hover { color: var(--text-primary); background: var(--bg-hover); }
        .geo-nav a.active { background: var(--text-primary); color: var(--bg-base); font-weight: 600; }
        .geo-nav a.home { color: #0891b2; font-weight: 600; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .hero { text-align: center; margin-bottom: 16px; }
        .hero h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 4px; }
        .hero h1 span { background: linear-gradient(135deg, #dc2626, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { color: var(--text-secondary); font-size: 0.92rem; }

        .mode-tabs { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
        .mode-tab { padding: 10px 18px; border-radius: var(--radius-full); border: 2px solid var(--border-subtle); background: var(--bg-raised); color: var(--text-secondary); cursor: pointer; font-weight: 700; font-size: 0.85rem; transition: all 0.2s; }
        .mode-tab:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .mode-tab.active { background: linear-gradient(135deg, #dc2626, #f59e0b); color: #fff; border-color: transparent; }

        .scale-switch { display: flex; gap: 6px; justify-content: center; margin-bottom: 12px; }
        .scale-btn { padding: 6px 14px; border-radius: var(--radius-full); border: 1px solid var(--border-subtle); background: var(--bg-raised); color: var(--text-secondary); font-weight: 700; cursor: pointer; font-size: 0.78rem; }
        .scale-btn.active { background: var(--text-primary); color: var(--bg-base); border-color: var(--text-primary); }

        .score-bar { background: var(--bg-raised); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; box-shadow: var(--shadow-sm); }
        .score-stat { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        .score-stat .big { font-size: 1.3rem; font-weight: 900; font-family: 'Courier New', monospace; }
        .score-stat.correct .big { color: #16a34a; }
        .score-stat.wrong .big { color: #dc2626; }

        .game-area { display: grid; grid-template-columns: 1fr 320px; gap: 16px; align-items: start; }
        @media (max-width: 900px) { .game-area { grid-template-columns: 1fr; } }

        .map-wrapper { background: linear-gradient(135deg, #e0f2fe 0%, #fef3c7 100%); border-radius: var(--radius-xl); padding: 16px; border: 1px solid var(--border-subtle); box-shadow: var(--shadow-md); min-height: 500px; }
        [data-theme="dark"] .map-wrapper { background: linear-gradient(135deg, #0c4a6e, #78350f); }
        #map { height: 520px; width: 100%; }

        .jvm-tooltip { background: rgba(0,0,0,0.85); color: #fff; padding: 6px 12px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; }

        .side-panel { background: var(--bg-raised); border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); padding: 18px; box-shadow: var(--shadow-sm); max-height: 520px; overflow-y: auto; }
        .side-panel h3 { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 10px; font-weight: 800; }

        .question-box { background: linear-gradient(135deg, #fef3c7, #fde68a); border: 2px solid #f59e0b; border-radius: var(--radius-lg); padding: 16px; margin-bottom: 14px; text-align: center; color: #78350f; font-weight: 700; }
        [data-theme="dark"] .question-box { background: linear-gradient(135deg, rgba(251, 191, 36, 0.15), rgba(245, 158, 11, 0.1)); color: #fde68a; }
        .question-box .label { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; display: block; margin-bottom: 4px; opacity: 0.75; }
        .question-box .target { font-size: 1.3rem; display: block; color: #dc2626; }
        [data-theme="dark"] .question-box .target { color: #fca5a5; }

        .info-card { background: var(--bg-base); padding: 16px; border-radius: 12px; border: 1px solid var(--border-subtle); }
        .info-card h4 { color: #dc2626; font-size: 1.15rem; margin-bottom: 6px; }
        .info-card .meta { display: grid; gap: 6px; font-size: 0.88rem; color: var(--text-secondary); margin-bottom: 10px; }
        .info-card .meta div { padding: 6px 10px; background: var(--bg-raised); border-radius: 6px; }
        .info-card .meta strong { color: var(--text-primary); }
        .info-card .fact { background: rgba(220, 38, 38, 0.08); border-left: 3px solid #dc2626; padding: 10px 12px; border-radius: 0 8px 8px 0; font-size: 0.85rem; color: var(--text-secondary); line-height: 1.55; }
        .info-card .provinces { margin-top: 8px; font-size: 0.82rem; color: var(--text-muted); }
        .info-card .provinces strong { color: var(--text-secondary); }

        .options-list { display: grid; gap: 8px; }
        .option-btn { padding: 12px 14px; border-radius: 10px; border: 2px solid var(--border-subtle); background: var(--bg-base); color: var(--text-primary); text-align: left; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: all 0.15s; }
        .option-btn:hover:not(:disabled) { border-color: #dc2626; transform: translateX(3px); }
        .option-btn.correct { background: rgba(34,197,94,0.15); border-color: #22c55e; color: #16a34a; }
        .option-btn.wrong { background: rgba(239,68,68,0.15); border-color: #ef4444; color: #dc2626; }
        .option-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .final-box { background: linear-gradient(135deg, #fef3c7, #fde68a); border: 2px solid #f59e0b; border-radius: var(--radius-xl); padding: 24px; text-align: center; margin-top: 14px; display: none; }
        .final-box.show { display: block; }
        [data-theme="dark"] .final-box { background: linear-gradient(135deg, rgba(251, 191, 36, 0.15), rgba(245, 158, 11, 0.08)); }
        .final-box .trophy { font-size: 3rem; margin-bottom: 4px; }
        .final-box h3 { font-size: 1.3rem; color: #78350f; margin-bottom: 6px; }
        [data-theme="dark"] .final-box h3 { color: #fde68a; }
        .final-box p { color: #92400e; font-weight: 600; margin-bottom: 12px; }
        [data-theme="dark"] .final-box p { color: #fbbf24; }
        .btn-restart { padding: 10px 22px; border-radius: var(--radius-full); background: #dc2626; color: #fff; border: none; font-weight: 700; cursor: pointer; font-size: 0.9rem; }
    </style>
</head>

// Build province → color map from CCAA colors
function buildProvinceColors() {
    const colors = {};
    Object.keys(CCAA_PROVINCES).forEach(key => {
        const ccaa = CCAA_PROVINCES[key];
        ccaa.provinces.forEach(p => { colors[p] = ccaa.color; });
    });
    return colors;
}

// Province codes per CCAA for selecting
function provincesInCCAA(ccaaKey) { return CCAA_PROVINCES[ccaaKey].provinces; }

// State
let currentScale = 'ccaa';
let currentMode = 'explore';
let score = { correct: 0, wrong: 0, done: 0, total: 17 };
let currentTarget = null;
let questionPool = [];

// Initialize map with CCAA-colored provinces
const provColors = buildProvinceColors();
const map = new jsVectorMap({
    selector: '#map',
    map: 'spain',
    backgroundColor: 'transparent',
    zoomOnScroll: true,
    zoomButtons: true,
    regionStyle: {
        initial: { stroke: '#fff', strokeWidth: 0.8, fill: '#cbd5e1' },
        hover: { fillOpacity: 0.75, cursor: 'pointer' },
        selected: { fill: '#16a34a' }
    },
    regionsSelectable: true,
    regionsSelectableOne: false,
    series: {
        regions: [{
            attribute: 'fill',
            values: provColors,
            scale: null
        }]
    },
    onRegionTooltipShow(event, tooltip, code) {
        const prov = PROV_DETAILS[code];
        if (!prov) { tooltip.text(code); return; }
        if (currentScale === 'ccaa') {
            tooltip.text(CCAA_PROVINCES[prov.ccaa].name);
        } else {
            tooltip.text(`${prov.name} (${CCAA_PROVINCES[prov.ccaa].name})`);
        }
    },
    onRegionClick(event, code) {
        const prov = PROV_DETAILS[code];
        if (!prov) return;
        if (currentMode === 'explore') {
            handleExploreClick(prov.ccaa, code);
        } else if (currentMode === 'locate') {
            if (currentScale === 'ccaa') handleLocateCCAA(prov.ccaa);
            else handleLocateProvince(code);
        }
    }
});

function setScale(scale) {
    currentScale = scale;
    document.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    score.total = scale === 'ccaa' ? 17 : 50;
    startMode(currentMode);
}

function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    startMode(mode);
}

function startMode(mode) {
    score = { correct: 0, wrong: 0, done: 0, total: currentScale === 'ccaa' ? 17 : 50 };
    map.clearSelectedRegions();
    document.getElementById('final').classList.remove('show');
    updateScore();
    buildQuestionPool();

    // In explore mode, each CCAA keeps its color. In quiz modes, all regions
    // are grey so the user can't cheat by color matching.
    applyRegionColors(mode === 'explore');

    if (mode === 'explore') setupExplore();
    else if (mode === 'locate') setupLocate();
    else if (mode === 'capital') setupCapital();
}

function applyRegionColors(withColors) {
    if (withColors) {
        Object.keys(provColors).forEach(code => {
            map.series.regions[0].setValues({ [code]: provColors[code] });
        });
    } else {
        // Paint all regions grey
        const grey = {};
        Object.keys(provColors).forEach(code => { grey[code] = '#cbd5e1'; });
        map.series.regions[0].setValues(grey);
    }
}

function buildQuestionPool() {
    if (currentScale === 'ccaa') {
        questionPool = Object.keys(CCAA_PROVINCES).filter(k => !['ceuta','melilla'].includes(k));
    } else {
        questionPool = Object.keys(PROV_DETAILS);
    }
    questionPool = questionPool.sort(() => Math.random() - 0.5);
    score.total = questionPool.length;
}

function updateScore() {
    document.getElementById('scCorrect').textContent = score.correct;
    document.getElementById('scWrong').textContent = score.wrong;
    document.getElementById('scProg').textContent = `${score.done}/${score.total}`;
    if (currentMode !== 'explore' && score.done >= score.total && score.total > 0) setTimeout(showFinal, 500);
}

function showFinal() {
    const pct = Math.round((score.correct / score.total) * 100);
    let trophy, title, msg;
    if (pct >= 90) { trophy = '🏆'; title = 'Geni!'; msg = `${score.correct} de ${score.total} (${pct}%). Excel·lent!`; }
    else if (pct >= 70) { trophy = '🥈'; title = 'Molt bé!'; msg = `${score.correct}/${score.total} (${pct}%).`; }
    else if (pct >= 50) { trophy = '🥉'; title = 'Aprovat'; msg = `${score.correct}/${score.total} (${pct}%).`; }
    else { trophy = '📚'; title = 'A estudiar'; msg = `${score.correct}/${score.total} (${pct}%). Prova Exploració.`; }
    document.getElementById('trophy').textContent = trophy;
    document.getElementById('finalTitle').textContent = title;
    document.getElementById('finalMsg').textContent = msg;
    document.getElementById('final').classList.add('show');
}

// --- EXPLORE MODE ---

    document.getElementById('panelTitle').textContent = '🔍 Exploració lliure';
    document.getElementById('panelContent').innerHTML = `
        <p style="color:var(--text-secondary);font-size:0.88rem;line-height:1.55;margin-bottom:12px;">Clica qualsevol CCAA del mapa per veure'n la fitxa. Canvia entre vista CCAA o Províncies amb els botons de dalt.</p>
        <div id="infoBox" style="background:var(--bg-base);padding:18px;border-radius:10px;border:1px dashed var(--border-default);text-align:center;color:var(--text-muted);font-size:0.88rem;">
            <div style="font-size:2rem;margin-bottom:6px;">🇪🇸</div>
            Clica una regió del mapa
        </div>
    `;
}

function handleExploreClick(ccaaKey, provCode) {
    const ccaa = CCAA_PROVINCES[ccaaKey];
    const prov = PROV_DETAILS[provCode];

    // Highlight all provinces of this CCAA
    map.clearSelectedRegions();
    map.setSelected('regions', ccaa.provinces);

    document.getElementById('infoBox').style.textAlign = 'left';
    document.getElementById('infoBox').style.border = '1px solid var(--border-subtle)';
    document.getElementById('infoBox').innerHTML = `
        <div class="info-card" style="border-left:4px solid ${ccaa.color};">
            <h4 style="color:${ccaa.color};">${ccaa.name}</h4>
            <div class="meta">
                <div>🏛️ Capital: <strong>${ccaa.cap}</strong></div>
                <div>📍 Has clicat: <strong>${prov.name}</strong></div>
                <div>📊 Províncies (${ccaa.provinces.length}):</div>
            </div>
            <div class="provinces"><strong>${ccaa.provNames}</strong></div>
            <div class="fact" style="margin-top:10px;">💡 ${ccaa.fact}</div>
        </div>
    `;
}

// --- LOCATE MODE ---
function setupLocate() {
    document.getElementById('panelTitle').textContent = '📍 Localitza al mapa';
    nextLocate();
}

function nextLocate() {
    if (questionPool.length === 0) { updateScore(); return; }
    currentTarget = questionPool.shift();
    const label = currentScale === 'ccaa' ? CCAA_PROVINCES[currentTarget].name : `${PROV_DETAILS[currentTarget].name} (província)`;
    map.clearSelectedRegions();
    document.getElementById('panelContent').innerHTML = `
        <div class="question-box">
            <span class="label">Clica al mapa</span>
            <span class="target">${label}</span>
        </div>
        <p style="color:var(--text-secondary);font-size:0.82rem;text-align:center;">🔍 Pots ampliar amb la roda del ratolí si cal.</p>
    `;
}

function handleLocateCCAA(clickedCcaa) {
    if (!currentTarget) return;
    const targetProvinces = CCAA_PROVINCES[currentTarget].provinces;
    if (clickedCcaa === currentTarget) {
        map.setSelected('regions', targetProvinces);
        score.correct++;
    } else {
        map.setSelected('regions', CCAA_PROVINCES[clickedCcaa].provinces);
        setTimeout(() => { map.setSelected('regions', targetProvinces); }, 700);
        score.wrong++;
    }
    score.done++; updateScore();
    setTimeout(() => { map.clearSelectedRegions(); nextLocate(); }, 1400);
}

function handleLocateProvince(code) {
    if (!currentTarget) return;
    if (code === currentTarget) {
        map.setSelected('regions', [code]);
        score.correct++;
    } else {
        map.setSelected('regions', [code]);
        setTimeout(() => { map.setSelected('regions', [currentTarget]); }, 700);
        score.wrong++;
    }
    score.done++; updateScore();
    setTimeout(() => { map.clearSelectedRegions(); nextLocate(); }, 1400);
}

// --- CAPITAL MODE ---
function setupCapital() {
    document.getElementById('panelTitle').textContent = '🏛️ Quiz de capitals';
    if (currentScale === 'provinces') {
        // Capital mode only for CCAA
        document.getElementById('panelContent').innerHTML = `<p style="color:var(--text-secondary);font-size:0.88rem;text-align:center;padding:20px;">El quiz de capitals només està disponible en vista <strong>CCAA</strong>. Canvia-hi a dalt!</p>`;
        return;
    }
    nextCapital();
}

function nextCapital() {
    if (questionPool.length === 0) { updateScore(); return; }
    currentTarget = questionPool.shift();
    const ccaa = CCAA_PROVINCES[currentTarget];
    map.clearSelectedRegions();
    map.setSelected('regions', ccaa.provinces);

    const allKeys = Object.keys(CCAA_PROVINCES).filter(k => !['ceuta','melilla'].includes(k));
    const others = allKeys.filter(k => k !== currentTarget).sort(() => Math.random() - 0.5).slice(0, 3);
    const opts = [currentTarget, ...others].sort(() => Math.random() - 0.5);

    document.getElementById('panelContent').innerHTML = `
        <div class="question-box">
            <span class="label">Quina és la capital de</span>
            <span class="target">${ccaa.name}</span>
        </div>
        <div class="options-list">
            ${opts.map(k => `<button class="option-btn" data-k="${k}">${CCAA_PROVINCES[k].cap}</button>`).join('')}
        </div>
    `;
    document.querySelectorAll('.option-btn').forEach(btn => {
        btn.onclick = () => {
            const ok = btn.dataset.k === currentTarget;
            if (ok) { btn.classList.add('correct'); score.correct++; }
            else {
                btn.classList.add('wrong');
                document.querySelector(`.option-btn[data-k="${currentTarget}"]`).classList.add('correct');
                score.wrong++;
            }
            document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
            score.done++; updateScore();
            setTimeout(() => { map.clearSelectedRegions(); nextCapital(); }, 1100);
        };
    });
}

startMode('explore');
</script>
</body>
</html>
