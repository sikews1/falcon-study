<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Calculadora</title>
<link rel="stylesheet" href="../styles.css">
<style>
.math-nav{background:rgba(240,240,243,.85);backdrop-filter:blur(20px);padding:8px 16px;display:flex;justify-content:center;gap:4px;flex-wrap:wrap;border-bottom:1px solid var(--border-subtle);position:sticky;top:0;z-index:200}
[data-theme="dark"] .math-nav{background:rgba(15,23,41,.85)}
.math-nav a{padding:6px 14px;border-radius:9999px;color:var(--text-secondary);text-decoration:none;font-size:.8rem;font-weight:500}.math-nav a:hover{color:var(--text-primary);background:var(--bg-hover)}.math-nav a.home{color:#059669;font-weight:600}

.calc-page{display:flex;gap:16px;max-width:720px;margin:0 auto;padding:12px 16px;min-height:calc(100vh - 50px);align-items:flex-start}
.calc-main{flex:1;min-width:0;max-width:380px}
.calc-side{width:220px;flex-shrink:0}

/* Display */
.display{background:var(--bg-raised);border:1px solid var(--border-subtle);border-radius:16px;padding:12px 16px;margin-bottom:10px;text-align:right;box-shadow:var(--shadow-sm)}
.display-input{font-size:.85rem;color:var(--text-muted);min-height:18px;word-break:break-all;font-family:'Inter',monospace}
.display-result{font-size:2.2rem;font-weight:800;color:var(--text-primary);word-break:break-all;font-family:'Inter',monospace;line-height:1.2}

/* Buttons */
.btns{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.b{padding:0;border:1px solid var(--border-subtle);border-radius:12px;background:var(--bg-raised);color:var(--text-primary);font-size:.88rem;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;height:44px;user-select:none}
.b:hover{background:var(--bg-hover);transform:translateY(-1px)}.b:active{transform:translateY(0)}
.b.num{font-size:1.1rem}
.b.op{background:linear-gradient(135deg,#059669,#10b981);color:#fff;border-color:transparent;font-size:1.1rem}.b.op:hover{filter:brightness(1.1)}
.b.sci{background:var(--bg-overlay);font-size:.78rem;font-weight:500}.b.sci:hover{background:rgba(5,150,105,.12);color:#059669}
.b.clr{background:rgba(239,68,68,.08);color:#ef4444;border-color:transparent;font-weight:700}.b.clr:hover{background:rgba(239,68,68,.15)}
.b.eq{background:linear-gradient(135deg,#059669,#10b981);color:#fff;border-color:transparent;grid-column:span 2;font-size:1.3rem;font-weight:800}.b.eq:hover{filter:brightness(1.1)}

/* History */
.hist{background:var(--bg-raised);border:1px solid var(--border-subtle);border-radius:16px;padding:12px;box-shadow:var(--shadow-sm)}
.hist h3{font-size:.8rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin:0 0 8px}
.hist-list{list-style:none;padding:0;margin:0;max-height:calc(100vh - 140px);overflow-y:auto}
.hist-list li{padding:6px 8px;border-radius:8px;font-size:.78rem;color:var(--text-secondary);cursor:pointer;display:flex;justify-content:space-between;gap:8px;transition:background .15s;font-family:'Inter',monospace}
.hist-list li:hover{background:var(--bg-hover)}
.hist-expr{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-res{font-weight:700;color:#059669;white-space:nowrap}
.hist-empty{color:var(--text-muted);font-size:.78rem;text-align:center;padding:20px 0}
.hist-clear{display:block;margin:8px auto 0;padding:4px 12px;border:1px solid var(--border-subtle);border-radius:12px;background:transparent;color:var(--text-muted);font-size:.7rem;cursor:pointer;font-family:inherit}.hist-clear:hover{background:rgba(239,68,68,.08);color:#ef4444;border-color:transparent}

@media(max-width:600px){
    .calc-page{flex-direction:column;padding:8px 12px}
    .calc-main{max-width:100%}
    .calc-side{width:100%}
    .btns{gap:4px}
    .b{height:40px;border-radius:10px;font-size:.82rem}
    .b.num{font-size:1rem}
    .display-result{font-size:1.8rem}
}
</style>
</head>
<body>
<div class="math-nav">
    <a href="../index.html" class="home">&#8592; Cursos</a>
    <a href="index.html">Inici</a>
</div>

<div class="calc-page">
    <div class="calc-main">
        <div class="display">
            <div class="display-input" id="di"></div>
            <div class="display-result" id="dr">0</div>
        </div>
        <div class="btns">
            <button class="b sci" onclick="sci('sin(')">sin</button>
            <button class="b sci" onclick="sci('cos(')">cos</button>
            <button class="b sci" onclick="sci('tan(')">tan</button>
            <button class="b sci" onclick="sci('sqrt(')">&#8730;</button>
            <button class="b sci" onclick="sci('^2')">x&#178;</button>

            <button class="b sci" onclick="sci('log(')">log</button>
            <button class="b sci" onclick="sci('ln(')">ln</button>
            <button class="b sci" onclick="sci('pi')">&#960;</button>
            <button class="b sci" onclick="sci('e')">e</button>
            <button class="b sci" onclick="ap('%')">%</button>

            <button class="b clr" onclick="clr()">C</button>
            <button class="b clr" onclick="ce()">&#9003;</button>
            <button class="b" onclick="ap('(')">(</button>
            <button class="b" onclick="ap(')')">)</button>
            <button class="b op" onclick="ap('&#247;')">&#247;</button>

            <button class="b num" onclick="ap('7')">7</button>
            <button class="b num" onclick="ap('8')">8</button>
            <button class="b num" onclick="ap('9')">9</button>
            <button class="b op" onclick="ap('&#215;')">&#215;</button>
            <button class="b" onclick="sgn()">&#177;</button>

            <button class="b num" onclick="ap('4')">4</button>
            <button class="b num" onclick="ap('5')">5</button>
            <button class="b num" onclick="ap('6')">6</button>
            <button class="b op" onclick="ap('&#8722;')">&#8722;</button>
            <button class="b op" onclick="ap('+')">+</button>

            <button class="b num" onclick="ap('1')">1</button>
            <button class="b num" onclick="ap('2')">2</button>
            <button class="b num" onclick="ap('3')">3</button>
            <button class="b eq" onclick="calc()">=</button>

            <button class="b num" onclick="ap('0')" style="grid-column:span 2">0</button>
            <button class="b num" onclick="ap('.')">.</button>
        </div>
    </div>
    <div class="calc-side">
        <div class="hist">
            <h3>Historial</h3>
            <ul class="hist-list" id="hl"><li class="hist-empty">Cap càlcul</li></ul>
            <button class="hist-clear" onclick="clrH()">Esborrar</button>
        </div>
    </div>
</div>

<script>
let expr='',hist=[];
const di=document.getElementById('di'),dr=document.getElementById('dr'),hl=document.getElementById('hl');

function upd(){di.textContent=expr||'';if(!expr)dr.textContent='0';}
function ap(v){expr+=v;upd();}
function sci(v){expr+=v;upd();}
function clr(){expr='';dr.textContent='0';upd();}
function ce(){expr=expr.slice(0,-1);upd();}
function sgn(){
    const m=expr.match(/(.*?)(-?\d+\.?\d*)$/);
    if(m){const p=m[1],n=m[2];expr=n.startsWith('-')?p+n.slice(1):p+'(-'+n+')';upd();}
}
function prep(e){
    e=e.replace(/\u00d7/g,'*').replace(/\u00f7/g,'/').replace(/\u2212/g,'-');
    e=e.replace(/sin\(/g,'Math.sin(').replace(/cos\(/g,'Math.cos(').replace(/tan\(/g,'Math.tan(');
    e=e.replace(/sqrt\(/g,'Math.sqrt(').replace(/log\(/g,'Math.log10(').replace(/ln\(/g,'Math.log(');
    e=e.replace(/\^2/g,'**2').replace(/pi/g,'Math.PI');
    e=e.replace(/(?<!Math\.\w*)(?<![\w.])e(?![\w])/g,'Math.E').replace(/%/g,'/100');
    return e;
}
function calc(){
    if(!expr)return;
    try{
        const r=Function('"use strict";return('+prep(expr)+')')();
        if(r===undefined||r===null||isNaN(r)){dr.textContent='Error';return;}
        const d=Number.isInteger(r)?r.toString():parseFloat(r.toFixed(10)).toString();
        dr.textContent=d;
        hist.unshift({e:expr,r:d});if(hist.length>15)hist.pop();renderH();
        expr=d;upd();
    }catch(e){dr.textContent='Error';}
}
function renderH(){
    if(!hist.length){hl.innerHTML='<li class="hist-empty">Cap càlcul</li>';return;}
    hl.innerHTML=hist.map(h=>`<li onclick="expr='${h.r}';dr.textContent='${h.r}';upd()"><span class="hist-expr">${h.e}</span><span class="hist-res">= ${h.r}</span></li>`).join('');
}
function clrH(){hist=[];renderH();}

document.addEventListener('keydown',e=>{
    const k=e.key;
    if(k>='0'&&k<='9')ap(k);
    else if(k==='.')ap('.');
    else if(k==='+')ap('+');
    else if(k==='-')ap('-');
    else if(k==='*')ap('\u00d7');
    else if(k==='/'){e.preventDefault();ap('\u00f7');}
    else if(k==='('||k===')')ap(k);
    else if(k==='Enter'||k==='='){e.preventDefault();calc();}
    else if(k==='Backspace')ce();
    else if(k==='Escape')clr();
});

// Embed mode: hide nav and make compact when loaded inside iframe/popup
if (new URLSearchParams(window.location.search).get('embed') === '1' || window !== window.top) {
    const nav = document.querySelector('.math-nav');
    if (nav) nav.style.display = 'none';
    document.querySelector('.calc-page').style.padding = '8px 12px';
    document.querySelector('.calc-page').style.minHeight = 'auto';
}
</script>
<script src="../theme.js"></script>
<script src="../auth.js"></script>
</body>
</html>
