<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards - C1 Catala</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        .cat-nav {
            background: rgba(var(--bg-base-rgb, 240,240,243), 0.85);
            backdrop-filter: blur(20px);
            padding: 12px 20px;
            display: flex;
            justify-content: center;
            gap: 4px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border-subtle);
            position: sticky;
            top: 0;
            z-index: 200;
        }

        .cat-nav a {
            padding: 8px 16px;
            border-radius: var(--radius-full);
            border: none;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 500;
            transition: all 0.25s;
            background: transparent;
        }

        .cat-nav a:hover { color: var(--text-primary); background: var(--bg-hover); }
        .cat-nav a.active { background: var(--text-primary); color: var(--bg-base); font-weight: 600; }
        .cat-nav a.home { color: var(--accent); font-weight: 600; }
        .cat-nav a.home:hover { background: var(--accent-soft); }

        .hero {
            text-align: center;
            padding: 48px 24px 40px;
            border-bottom: 1px solid var(--border-subtle);
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 50% 80% at 30% 0%, rgba(251, 191, 36, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse 40% 60% at 70% 20%, rgba(239, 68, 68, 0.04) 0%, transparent 60%);
            pointer-events: none;
        }

        .hero h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
            position: relative;
        }

        .hero h1 span {
            background: linear-gradient(135deg, #fbbf24, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            position: relative;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 32px 20px; }

        /* Category selector */
        .category-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .category-selector button {
            padding: 8px 18px;
            border-radius: 25px;
            border: 2px solid var(--border-subtle);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s;
            font-family: var(--font-sans);
        }

        .category-selector button:hover { border-color: var(--accent); color: var(--accent); }
        .category-selector button.active { background: linear-gradient(135deg, #fbbf24, #ef4444); border-color: transparent; color: #fff; }

        /* Flashcard */
        .flashcard-container {
            perspective: 1000px;
            max-width: 550px;
            margin: 0 auto 30px;
            height: 340px;
            cursor: pointer;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .flashcard.flipped { transform: rotateY(180deg); }

        .flashcard-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 35px;
            text-align: center;
        }

        .flashcard-front {
            background: linear-gradient(135deg, var(--bg-raised), var(--bg-raised));
            border: 2px solid var(--border-subtle);
        }

        .flashcard-back {
            background: linear-gradient(135deg, var(--bg-raised), var(--bg-overlay));
            border: 2px solid #fbbf24;
            transform: rotateY(180deg);
            overflow-y: auto;
        }

        .flashcard-front .term {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .flashcard-front .hint {
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 600;
        }

        .flashcard-front .flip-hint {
            color: var(--text-muted);
            font-size: 0.8rem;
            position: absolute;
            bottom: 20px;
        }

        .flashcard-back .answer {
            font-size: 0.95rem;
            color: var(--text-primary);
            line-height: 1.7;
            text-align: left;
        }

        .flashcard-back .answer strong { color: #ef4444; }
        .flashcard-back .answer em { color: #fbbf24; font-style: normal; font-weight: 600; }
        .flashcard-back .answer code {
            background: var(--bg-overlay);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.88rem;
            color: var(--accent);
        }

        /* Controls */
        .fc-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .fc-counter {
            color: var(--text-secondary);
            font-size: 0.9rem;
            min-width: 80px;
            text-align: center;
        }

        /* Know / Don't know */
        .fc-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .fc-actions button {
            padding: 12px 30px;
            border-radius: 25px;
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: var(--font-sans);
        }

        .btn-know { background: #22c55e; color: #fff; }
        .btn-know:hover { background: #16a34a; transform: translateY(-2px); }
        .btn-dontknow { background: #ef4444; color: #fff; }
        .btn-dontknow:hover { background: #dc2626; transform: translateY(-2px); }

        /* Stats */
        .fc-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            padding: 15px;
            background: var(--bg-raised);
            border-radius: 12px;
            border: 1px solid var(--border-subtle);
        }

        .fc-stat { text-align: center; }
        .fc-stat .num { font-size: 1.5rem; font-weight: 700; }
        .fc-stat .lbl { font-size: 0.75rem; color: var(--text-secondary); }

        .shortcuts-info {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 15px;
        }

        .shortcuts-info kbd {
            background: var(--border-subtle);
            padding: 2px 8px;
            border-radius: 4px;
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        @media (max-width: 640px) {
            .flashcard-container { height: 380px; }
            .flashcard-face { padding: 24px; }
            .flashcard-front .term { font-size: 1.2rem; }
            .flashcard-back .answer { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<div class="cat-nav">
    <a href="../index.html" class="home">&#8592; Cursos</a>
    <a href="index.html">Inici</a>
    <a href="gramatica.html">Gramatica</a>
    <a href="quiz.html">Quiz</a>
    <a href="flashcards.html" class="active">Flashcards</a>
    <a href="redaccio.html">Redaccio</a>
</div>

<div class="hero">
    <h1><span>Flashcards</span> de Gramatica</h1>
    <p>Fes clic a la targeta per veure la resposta. Marca si la saps o no.</p>
</div>

<div class="container">
    <div class="category-selector" id="categorySelector">
        <button class="active" data-cat="all">Totes</button>
        <button data-cat="accentuacio">Accentuacio</button>
        <button data-cat="apostrofacio">Apostrofacio</button>
        <button data-cat="pronoms">Pronoms</button>
        <button data-cat="verbs">Verbs</button>
        <button data-cat="bv">B / V</button>
        <button data-cat="preposicions">Preposicions</button>
        <button data-cat="connectors">Connectors</button>
        <button data-cat="castellanismes">Castellanismes</button>
    </div>

    <div class="flashcard-container" id="flashcardContainer" onclick="flipCard()">
        <div class="flashcard" id="flashcard">
            <div class="flashcard-face flashcard-front" id="fcFront"></div>
            <div class="flashcard-face flashcard-back" id="fcBack"></div>
        </div>
    </div>

    <div class="fc-actions">
        <button class="btn-dontknow" onclick="markCard(false)">No ho se</button>
        <button class="btn-know" onclick="markCard(true)">Ho se</button>
    </div>

    <div class="fc-controls">
        <button class="btn btn-secondary" onclick="prevCard()" style="padding: 8px 20px;">&#9664; Anterior</button>
        <span class="fc-counter" id="fcCounter">1 / 40</span>
        <button class="btn btn-secondary" onclick="nextCard()" style="padding: 8px 20px;">Seguent &#9654;</button>
    </div>

    <div class="fc-stats">
        <div class="fc-stat"><div class="num" style="color: var(--green)" id="knownCount">0</div><div class="lbl">Ho se</div></div>
        <div class="fc-stat"><div class="num" style="color: var(--red)" id="unknownCount">0</div><div class="lbl">No ho se</div></div>
        <div class="fc-stat"><div class="num" style="color: var(--blue)" id="remainCount">0</div><div class="lbl">Pendents</div></div>
    </div>

    <div class="shortcuts-info">
        <kbd>Espai</kbd> girar &nbsp; <kbd>&#8592;</kbd> anterior &nbsp; <kbd>&#8594;</kbd> seguent &nbsp; <kbd>1</kbd> ho se &nbsp; <kbd>2</kbd> no ho se
    </div>

    <div id="fcSummary" style="display:none;"></div>
</div>

<div class="footer">C1 Catala - Material d'estudi per a Mossos d'Esquadra</div>

<script>
const allCards = [
    // === ACCENTUACIO ===
    { cat: "accentuacio", front: "Accent obert vs tancat: E", hint: "Vocals toniques", back: "Accent <strong>obert (e)</strong>: so mes ample. Ex: <em>cafe, tambe, acces</em>.<br>Accent <strong>tancat (e)</strong>: so mes tancat. Ex: <em>angles, frances, cortes</em>.<br><br>Truc: si en castella es <strong>ie</strong> (tierra), en catala es <strong>e oberta</strong> (terra)." },
    { cat: "accentuacio", front: "Accent obert vs tancat: O", hint: "Vocals toniques", back: "Accent <strong>obert (o)</strong>: so mes ample. Ex: <em>historic, mon, cosa</em>.<br>Accent <strong>tancat (o)</strong>: so mes tancat. Ex: <em>acusacio, informacio, atencio</em>.<br><br>Les paraules acabades en <strong>-cio, -sio</strong> sempre porten accent tancat." },
    { cat: "accentuacio", front: "Regla agudes", hint: "Quan s'accentuen?", back: "S'accentuen les paraules <strong>agudes</strong> acabades en:<br>- vocal: <em>cafe, tambe</em><br>- vocal + <strong>s</strong>: <em>angles, Frances</em><br>- <strong>-en, -in</strong>: <em>tambe, alli</em><br><br>Mai s'accentuen si acaben en altres consonants." },
    { cat: "accentuacio", front: "Regla planes", hint: "Quan s'accentuen?", back: "S'accentuen les paraules <strong>planes</strong> que <strong>NO</strong> acaben en:<br>- vocal<br>- vocal + <strong>s</strong><br>- <strong>-en, -in</strong><br><br>Exemples: <em>facil, util, examens, caracter</em>." },
    { cat: "accentuacio", front: "Regla esdruixoles", hint: "Sempre s'accentuen?", back: "<strong>Si!</strong> Totes les paraules esdruixoles s'accentuen <strong>sempre</strong>.<br><br>Exemples: <em>musica, cientific, grammatic, historic, academia, ultima</em>." },
    { cat: "accentuacio", front: "Diacritics mes importants", hint: "Accents que canvien significat", back: "<strong>be</strong> (lletra) vs <strong>be</strong> (ovella)<br><strong>dona</strong> (verb donar) vs <strong>dona</strong> (senyora)<br><strong>es</strong> (verb ser) vs <strong>es</strong> (reflexiu)<br><strong>ma</strong> (possessiu) vs <strong>ma</strong> (meva)<br><strong>mon</strong> (possessiu) vs <strong>mon</strong> (univers)<br><strong>os</strong> (animal) vs <strong>os</strong> (vosaltres)<br><strong>sol</strong> (astre) vs <strong>sol</strong> (verb soler)" },

    // === APOSTROFACIO ===
    { cat: "apostrofacio", front: "L'article davant vocal", hint: "Quan s'apostrofa?", back: "<strong>S'apostrofa</strong> l'article <em>el/la</em> davant de vocal o <em>h</em>:<br>- <em>l'home, l'escola, l'arbre</em><br><br><strong>Excepcions femenines</strong>: NO s'apostrofa davant <em>i, u</em> atons:<br>- <em>la universitat, la idea</em> (NO l'universitat)" },
    { cat: "apostrofacio", front: "Excepcions a l'apostrofacio", hint: "Quan NO s'apostrofa", back: "NO s'apostrofa davant:<br>- <strong>i, u atons</strong> femenins: <em>la idea, la uniformitat</em><br>- <strong>h aspirada</strong> en manlleus: <em>la holding</em><br>- <strong>Xifres</strong>: <em>el 11, la 1</em><br>- <strong>Lletres</strong>: <em>la efa, la essa</em>" },
    { cat: "apostrofacio", front: "Contraccions: al, del, pel", hint: "Article + preposicio", back: "Les contraccions son <strong>obligatories</strong>:<br>- <strong>a + el = al</strong>: <em>Vaig al parc</em><br>- <strong>de + el = del</strong>: <em>Surto del treball</em><br>- <strong>per + el = pel</strong>: <em>Camino pel carrer</em><br><br>Amb <strong>els</strong>: als, dels, pels." },
    { cat: "apostrofacio", front: "Apostrofacio de la preposicio DE", hint: "Quan s'apostrofa?", back: "<strong>de + vocal = d'</strong>:<br>- <em>d'acord, d'avui, d'una, d'aquella</em><br><br><strong>Excepcio</strong>: NO s'apostrofa davant <em>i, u</em> atons si la paraula es femenina singular sense article." },
    { cat: "apostrofacio", front: "Pronoms febles i apostrofacio", hint: "Davant i darrere del verb", back: "Davant del verb (comenca en vocal):<br>- <em>m'agrada, t'estimo, s'aixeca, l'admiro</em><br><br>Darrere del verb (acaba en vocal):<br>- <em>porta'l, mira'ns, diga-m'ho</em><br><br>Amb <strong>em, et, es, el, en</strong> s'apostrofen davant vocal." },

    // === PRONOMS FEBLES ===
    { cat: "pronoms", front: "El pronom EN", hint: "Funcions principals", back: "Substitueix:<br>1. <strong>Complement amb DE</strong>: <em>Vinc de Barcelona → En vinc</em><br>2. <strong>Partitiu</strong>: <em>Vull pa → En vull</em><br>3. <strong>Quantitat</strong>: <em>Tinc tres gats → En tinc tres</em><br>4. <strong>CD indefinit</strong>: <em>He comprat llibres → N'he comprat</em>" },
    { cat: "pronoms", front: "El pronom HI", hint: "Funcions principals", back: "Substitueix:<br>1. <strong>Lloc (sense DE)</strong>: <em>Vaig a casa → Hi vaig</em><br>2. <strong>Complements amb A, EN, AMB</strong>: <em>Penso en tu → Hi penso</em><br>3. <strong>Predicatiu</strong>: <em>Estas content? → Si, hi estic</em><br><br>Regla: si no es <em>de</em>, probablement es <strong>hi</strong>." },
    { cat: "pronoms", front: "HO: el pronom neutre", hint: "Que substitueix?", back: "Substitueix:<br>1. <strong>Frases senceres</strong>: <em>Se que vindras → Ho se</em><br>2. <strong>Atributs indefinits</strong>: <em>Es intel·ligent → Ho es</em><br>3. <strong>CD neutre (aixo, allo)</strong>: <em>Fes aixo → Fes-ho</em><br><br>Mai substitueix noms concrets (masculins/femenins)." },
    { cat: "pronoms", front: "Combinacio de dos pronoms", hint: "Ordre dels pronoms", back: "L'ordre es: <strong>reflexiu + CI + CD + EN/HI</strong><br><br>Exemples:<br>- <em>Me'l dona</em> (CI + CD)<br>- <em>Se n'ha anat</em> (reflexiu + EN)<br>- <em>Li'n porto</em> (CI + EN)<br>- <em>M'hi he acostumat</em> (reflexiu + HI)" },
    { cat: "pronoms", front: "Pronoms febles: formes plenes vs elidides", hint: "Davant/darrere vocal o consonant", back: "<strong>Davant consonant</strong> (plena): <em>em, et, es, el, la, en</em><br><strong>Davant vocal</strong> (elidida): <em>m', t', s', l', n'</em><br><strong>Darrere vocal</strong> (reduida): <em>-m, -t, -s, 'l, 'n</em><br><strong>Darrere consonant</strong> (reforçada): <em>-me, -te, -se, -lo, -ne</em>" },

    // === VERBS ===
    { cat: "verbs", front: "Present de subjuntiu: formacio", hint: "Verbs regulars", back: "Base del present d'indicatiu (1a persona) + terminacions:<br><br>1a conj. (-ar): <em>-i, -is, -i, -em, -eu, -in</em><br>2a conj. (-er/-re): <em>-i, -is, -i, -em, -eu, -in</em><br>3a conj. (-ir): <em>-i, -is, -i, -im, -iu, -in</em><br><br>Ex: canti, cantis, canti, cantem, canteu, cantin" },
    { cat: "verbs", front: "Ser vs Estar", hint: "Diferencies en catala", back: "<strong>Ser</strong>: essencia, identitat, professio.<br>- <em>Es metge. Es catala.</em><br><br><strong>Estar</strong>: estat temporal, resultat.<br>- <em>Estic content. Esta malalt.</em><br><br><strong>Diferencia amb castella</strong>: en catala <em>estar</em> s'usa menys. <em>Es viu</em> (no <em>esta viu</em>)." },
    { cat: "verbs", front: "Passat perifastic vs indefinit", hint: "Dos passats simples", back: "En catala normatiu s'usa el <strong>passat perifrasic</strong>:<br>- <em>vaig cantar, vas cantar, va cantar...</em><br><br>El <strong>passat simple</strong> (canti, cantares) es <strong>nomes literari</strong>.<br><br>Amb <strong>perfet</strong> (he cantat): accio vinculada al present." },
    { cat: "verbs", front: "Imperatiu: formes correctes", hint: "Errors frequents", back: "2a persona singular:<br>- <em>canta</em> (no <em>cantes</em>)<br>- <em>vine</em> (no <em>vines</em>)<br>- <em>fes</em> (no <em>fas</em>)<br><br>Negatiu sempre amb <strong>subjuntiu</strong>:<br>- <em>No cantis, no vinguis, no facis</em><br><br><strong>Amb pronoms</strong>: <em>fes-ho, digues-li, porta'l</em>" },
    { cat: "verbs", front: "Verbs amb canvi de conjugacio", hint: "Diferent del castella", back: "Verbs que en catala canvien de conjugacio:<br><br>- <strong>caldre</strong> (2a) vs caer (cast.): <em>Cal que vinguis</em><br>- <strong>coneixer</strong> (2a) vs conocer: <em>Conec la ciutat</em><br>- <strong>neixer</strong> (2a) vs nacer: <em>Vaig neixer a BCN</em><br>- <strong>apareixer</strong> (2a) vs aparecer" },
    { cat: "verbs", front: "Participis irregulars mes importants", hint: "No segueixen la regla general", back: "<strong>Participis irregulars</strong>:<br>- dir → <em>dit</em><br>- fer → <em>fet</em><br>- escriure → <em>escrit</em><br>- veure → <em>vist</em><br>- obrir → <em>obert</em><br>- morir → <em>mort</em><br>- posar → <em>post</em> (o posat)<br>- prendre → <em>pres</em>" },

    // === B / V ===
    { cat: "bv", front: "B davant de M i P", hint: "Regla basica", back: "Sempre s'escriu <strong>B</strong> davant de <strong>m</strong> i <strong>p</strong>:<br><br>- <em>amba, embrutar, combinar</em><br>- <em>absent, absoldre, obtenir</em><br><br>Mai V davant de M o P." },
    { cat: "bv", front: "V en imperfet d'indicatiu", hint: "1a conjugacio", back: "L'imperfet dels verbs de la <strong>1a conjugacio</strong> sempre s'escriu amb <strong>V</strong>:<br><br>- canta<strong>va</strong>, canta<strong>ves</strong>, canta<strong>va</strong><br>- canta<strong>vem</strong>, canta<strong>veu</strong>, canta<strong>ven</strong><br><br>Excepcio: <em>anar</em> fa <em>anava</em> (tambe V)." },
    { cat: "bv", front: "Paraules amb B vs V enganyoses", hint: "Les mes frequents a l'examen", back: "Amb <strong>B</strong>: <em>buit, baix, below, batre, bitllet, beure, ballar, bosc</em><br><br>Amb <strong>V</strong>: <em>veure, viure, voler, volar, vendre, venir, veritat, victima, govern</em><br><br>Truc: si en castella es <strong>B</strong>, en catala pot ser <strong>V</strong> i viceversa." },
    { cat: "bv", front: "Derivats i compostos: B o V?", hint: "Mantenen la mateixa grafia?", back: "Els derivats <strong>mantenen</strong> la B o V de la paraula original:<br><br>- <em>beure</em> → <em>beguda, bevedor</em><br>- <em>veure</em> → <em>visible, visio</em><br>- <em>viure</em> → <em>vivenda, vivencia</em><br>- <em>govern</em> → <em>governar, governador</em>" },
    { cat: "bv", front: "Terminacions -ble / -bilitat", hint: "Sempre amb B", back: "Les terminacions <strong>-ble</strong> i <strong>-bilitat</strong> sempre amb <strong>B</strong>:<br><br>- <em>possible, amable, sensible</em><br>- <em>possibilitat, amabilitat, sensibilitat</em><br>- <em>responsable, responsabilitat</em>" },

    // === PREPOSICIONS ===
    { cat: "preposicions", front: "Per vs Per a", hint: "Diferencia clau", back: "<strong>Per</strong>: causa, motiu, agent, a traves de.<br>- <em>Ho fa per amor</em> (causa)<br>- <em>Passa per la porta</em> (a traves)<br><br><strong>Per a</strong>: destinatari, finalitat.<br>- <em>Es per a tu</em> (destinatari)<br>- <em>Serveix per a menjar</em> (finalitat)<br><br>Truc: si pots dir <em>per tal de</em>, es <strong>per a</strong>." },
    { cat: "preposicions", front: "A vs En (lloc)", hint: "Direccio vs situacio", back: "<strong>A</strong>: direccio, moviment.<br>- <em>Vaig a Barcelona</em><br>- <em>Arribo a casa</em><br><br><strong>En</strong>: situacio, lloc fix.<br>- <em>Visc en un pis</em><br>- <em>Treballo en una oficina</em><br><br>En castella s'usa <em>en</em> per tot, en catala cal <strong>distingir</strong>." },
    { cat: "preposicions", front: "Amb vs En (instrument/companyia)", hint: "Error frequentissim", back: "<strong>Amb</strong>: companyia i instrument.<br>- <em>Vinc amb tu</em> (companyia)<br>- <em>Escric amb bolligraf</em> (instrument)<br><br><strong>En</strong>: NO s'usa per companyia/instrument en catala!<br>- <em>*Vinc en tu</em> = INCORRECTE<br>- <em>*Escric en bolligraf</em> = INCORRECTE" },
    { cat: "preposicions", front: "Cap a vs Cap", hint: "Direccio aproximada", back: "<strong>Cap a</strong>: direccio (com <em>hacia</em> en castella).<br>- <em>Camino cap a casa</em><br>- <em>Mira cap a la dreta</em><br><br><strong>Cap</strong> (sense <em>a</em>): significat de <em>ningun</em>.<br>- <em>No tinc cap problema</em><br>- <em>No veig cap solucio</em>" },
    { cat: "preposicions", front: "Fins a vs Fins", hint: "Limit o terme", back: "<strong>Fins a</strong>: limit espacial o temporal (la forma correcta).<br>- <em>Corro fins a la plaça</em><br>- <em>Treballo fins a les 5</em><br><br><strong>Fins</strong> sol: nomes davant de pronoms adverbials.<br>- <em>Fins ara, fins aqui</em>" },

    // === CONNECTORS ===
    { cat: "connectors", front: "Connectors d'introduccio", hint: "Per iniciar un text", back: "<strong>Per presentar el tema</strong>:<br>- <em>En primer lloc...</em><br>- <em>Pel que fa a...</em><br>- <em>Quant a...</em><br>- <em>Respecte a...</em><br>- <em>En relacio amb...</em><br><br><strong>Per situar</strong>:<br>- <em>Avui dia...</em><br>- <em>En l'actualitat...</em><br>- <em>Darrerament...</em>" },
    { cat: "connectors", front: "Connectors d'oposicio", hint: "Per contraargumentar", back: "<strong>Contrast</strong>:<br>- <em>No obstant aixo...</em><br>- <em>Tanmateix...</em><br>- <em>En canvi...</em><br>- <em>Ara be...</em><br>- <em>Malgrat que...</em><br>- <em>Tot i que...</em><br>- <em>Si be...</em><br><br><strong>Ull</strong>: <em>Tanmateix</em> es molt valorat a l'examen!" },
    { cat: "connectors", front: "Connectors de causa i consequencia", hint: "Per argumentar", back: "<strong>Causa</strong>:<br>- <em>Perque, ja que, ates que, com que</em><br>- <em>A causa de, gracies a, per culpa de</em><br><br><strong>Consequencia</strong>:<br>- <em>Per tant, doncs, en consequencia</em><br>- <em>Per aixo, d'aquesta manera</em><br>- <em>Aixi doncs, de manera que</em>" },
    { cat: "connectors", front: "Connectors de conclusio", hint: "Per tancar el text", back: "<strong>Per resumir</strong>:<br>- <em>En definitiva...</em><br>- <em>En resum...</em><br>- <em>Per concloure...</em><br>- <em>En conclusio...</em><br><br><strong>Per donar l'opinio final</strong>:<br>- <em>Al meu parer...</em><br>- <em>Des del meu punt de vista...</em><br>- <em>Considero que...</em>" },
    { cat: "connectors", front: "Connectors d'addicio i ordre", hint: "Per afegir i ordenar idees", back: "<strong>Addicio</strong>:<br>- <em>A mes (a mes)...</em><br>- <em>Tambe, aixi mateix</em><br>- <em>D'altra banda, per una altra banda</em><br><br><strong>Ordre</strong>:<br>- <em>En primer lloc... En segon lloc...</em><br>- <em>D'una banda... De l'altra...</em><br>- <em>Finalment, per acabar</em>" },

    // === CASTELLANISMES ===
    { cat: "castellanismes", front: "Castellanismes en preposicions", hint: "Els errors mes penalitzats", back: "<strong>INCORRECTE → CORRECTE</strong>:<br>- <em>*anar a por</em> → <em>anar a buscar</em><br>- <em>*quedar-se en</em> → <em>quedar-se a</em><br>- <em>*pensar de que</em> → <em>pensar que</em> (dequeisme)<br>- <em>*a lo millor</em> → <em>potser, tal vegada</em><br>- <em>*desde el punt de vista</em> → <em>des del punt de vista</em>" },
    { cat: "castellanismes", front: "Castellanismes lexics quotidians", hint: "Paraules trampa del dia a dia", back: "<strong>INCORRECTE → CORRECTE</strong>:<br>- <em>*bueno</em> → <em>be, doncs</em><br>- <em>*entonces</em> → <em>aleshores, llavors</em><br>- <em>*vale</em> → <em>d'acord, molt be</em><br>- <em>*pues</em> → <em>doncs</em><br>- <em>*desde luego</em> → <em>es clar, per descomptat</em><br>- <em>*embargo</em> → <em>no obstant, tanmateix</em>" },
    { cat: "castellanismes", front: "Castellanismes en verbs", hint: "Formes verbals incorrectes", back: "<strong>INCORRECTE → CORRECTE</strong>:<br>- <em>*donar-se compte</em> → <em>adonar-se</em><br>- <em>*fer-se falta</em> → <em>caldre, necessitar</em><br>- <em>*posar-se a</em> → <em>començar a, posar-se a</em> (correcte)<br>- <em>*quedar en</em> (acordar) → <em>quedar que</em><br>- <em>*aprofitar</em> → <em>aprofitar</em> (correcte) / <em>*aprovechar</em> → NO" },
    { cat: "castellanismes", front: "Falsos amics catala-castella", hint: "Paraules que no signifiquen el que sembla", back: "<strong>Falsos amics</strong>:<br>- <em>sortir</em> = salir (no <em>sortear</em>)<br>- <em>cercar</em> = buscar (no <em>cercar</em> cast.)<br>- <em>guardar</em> = mirar (no <em>guardar</em> cast.) → <em>desar</em> = guardar<br>- <em>llevar</em> = quitar (no <em>llevar</em> cast.) → <em>portar</em> = llevar<br>- <em>amo</em> = amo (correcte, pero <em>estimar</em> = querer)" },
    { cat: "castellanismes", front: "Redundancies i calcs del castella", hint: "Frases mal copiades", back: "<strong>INCORRECTE → CORRECTE</strong>:<br>- <em>*pujar a dalt</em> → <em>pujar</em><br>- <em>*baixar a baix</em> → <em>baixar</em><br>- <em>*entrar a dins</em> → <em>entrar</em><br>- <em>*el que passa es que</em> → <em>el que passa es que</em> (correcte pero evita-ho, es col·loquial)<br>- <em>*haver-hi que</em> → <em>caldre</em>" },
];

let currentCards = [];
let currentIdx = 0;
let marked = {};

function filterCards(cat) {
    currentCards = cat === 'all' ? [...allCards] : allCards.filter(c => c.cat === cat);
    currentCards.sort(() => Math.random() - 0.5);
    currentIdx = 0;
    marked = {};
    renderCard();
    updateStats();
    document.getElementById('fcSummary').style.display = 'none';
    document.getElementById('flashcardContainer').style.display = '';
    document.querySelector('.fc-actions').style.display = '';
    document.querySelector('.fc-controls').style.display = '';
}

function renderCard() {
    if (currentCards.length === 0) return;
    const c = currentCards[currentIdx];
    const isMarked = marked[currentIdx] !== undefined;

    const flipLabel = isMarked
        ? (marked[currentIdx] === 'known' ? '&#10003; Ho saps' : '&#10007; No ho saps')
        : 'Clic per girar';

    document.getElementById('flashcard').classList.remove('flipped');
    setTimeout(() => {
        document.getElementById('fcFront').innerHTML = `
            <div class="term">${c.front}</div>
            <div class="hint">${c.hint}</div>
            <div class="flip-hint">${flipLabel}</div>
        `;
        document.getElementById('fcBack').innerHTML = `<div class="answer">${c.back}</div>`;
    }, 150);
    document.getElementById('fcCounter').textContent = `${currentIdx + 1} / ${currentCards.length}`;

    const btns = document.querySelectorAll('.fc-actions button');
    btns.forEach(b => {
        b.disabled = isMarked;
        b.style.opacity = isMarked ? '0.4' : '1';
        b.style.cursor = isMarked ? 'default' : 'pointer';
    });
}

function flipCard() {
    document.getElementById('flashcard').classList.toggle('flipped');
}

function nextCard() {
    if (currentIdx < currentCards.length - 1) { currentIdx++; renderCard(); }
}

function prevCard() {
    if (currentIdx > 0) { currentIdx--; renderCard(); }
}

function markCard(isKnown) {
    if (marked[currentIdx] !== undefined) return;
    marked[currentIdx] = isKnown ? 'known' : 'unknown';
    updateStats();

    if (Object.keys(marked).length === currentCards.length) {
        setTimeout(showSummary, 300);
        return;
    }

    let next = currentIdx + 1;
    while (next < currentCards.length && marked[next] !== undefined) next++;
    if (next < currentCards.length) {
        currentIdx = next;
        renderCard();
    } else {
        next = 0;
        while (next < currentCards.length && marked[next] !== undefined) next++;
        if (next < currentCards.length) { currentIdx = next; renderCard(); }
    }
}

function updateStats() {
    let known = 0, unknown = 0;
    Object.values(marked).forEach(v => { if (v === 'known') known++; else unknown++; });
    document.getElementById('knownCount').textContent = known;
    document.getElementById('unknownCount').textContent = unknown;
    document.getElementById('remainCount').textContent = currentCards.length - known - unknown;
}

function showSummary() {
    let known = 0, unknown = 0;
    const wrongCards = [];
    Object.entries(marked).forEach(([idx, val]) => {
        if (val === 'known') known++;
        else { unknown++; wrongCards.push(currentCards[idx]); }
    });

    document.getElementById('flashcardContainer').style.display = 'none';
    document.querySelector('.fc-actions').style.display = 'none';
    document.querySelector('.fc-controls').style.display = 'none';

    const pct = Math.round((known / currentCards.length) * 100);

    let wrongHtml = '';
    if (wrongCards.length > 0) {
        wrongHtml = '<div style="text-align:left;margin-top:25px;"><h3 style="color: var(--accent);margin-bottom:12px;">Targetes per repassar:</h3>' +
            wrongCards.map(c => `<div style="background:var(--bg-base);border-radius:10px;padding:14px 18px;margin-bottom:8px;border-left:3px solid #fbbf24;">
                <div style="color: var(--text-primary);font-weight:700;margin-bottom:6px;">${c.front} <span style="color: var(--blue);font-size:0.8rem;">(${c.hint})</span></div>
                <div style="color: var(--text-secondary);font-size:0.9rem;">${c.back}</div>
            </div>`).join('') + '</div>';
    }

    const summary = document.getElementById('fcSummary');
    summary.style.display = 'block';
    summary.innerHTML = `
        <div style="text-align:center;padding:30px 0;">
            <div style="font-size:3.5rem;font-weight:700;color:${pct >= 70 ? '#22c55e' : '#ef4444'};margin-bottom:8px;">${pct}%</div>
            <div style="color: var(--text-secondary);font-size:1rem;margin-bottom:25px;">${known} de ${currentCards.length} targetes correctes</div>
            <div style="display:flex;justify-content:center;gap:25px;margin-bottom:25px;">
                <div><div style="font-size:2rem;font-weight:700;color: var(--green);">${known}</div><div style="color: var(--text-secondary);font-size:0.8rem;">Ho se</div></div>
                <div><div style="font-size:2rem;font-weight:700;color: var(--red);">${unknown}</div><div style="color: var(--text-secondary);font-size:0.8rem;">No ho se</div></div>
            </div>
            <button class="btn btn-primary" onclick="filterCards(document.querySelector('.category-selector .active').dataset.cat)" style="margin-right:10px;">Repetir</button>
            ${wrongCards.length > 0 ? '<button class="btn btn-secondary" onclick="retryWrong()" style="border-color: var(--accent);color: var(--accent);">Nomes les que he fallat (' + wrongCards.length + ')</button>' : ''}
            ${wrongHtml}
        </div>
    `;
}

function retryWrong() {
    const wrongCards = [];
    Object.entries(marked).forEach(([idx, val]) => {
        if (val === 'unknown') wrongCards.push(currentCards[idx]);
    });
    currentCards = wrongCards.sort(() => Math.random() - 0.5);
    currentIdx = 0;
    marked = {};
    document.getElementById('fcSummary').style.display = 'none';
    document.getElementById('flashcardContainer').style.display = '';
    document.querySelector('.fc-actions').style.display = '';
    document.querySelector('.fc-controls').style.display = '';
    renderCard();
    updateStats();
}

// Category selector
document.querySelectorAll('.category-selector button').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.category-selector button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filterCards(btn.dataset.cat);
    });
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); flipCard(); }
    if (e.code === 'ArrowRight') nextCard();
    if (e.code === 'ArrowLeft') prevCard();
    if (e.key === '1') markCard(true);
    if (e.key === '2') markCard(false);
});

// Init
const urlCat = new URLSearchParams(window.location.search).get('cat');
if (urlCat) {
    const btn = document.querySelector(`.category-selector button[data-cat="${urlCat}"]`);
    if (btn) { btn.click(); } else { filterCards('all'); }
} else {
    filterCards('all');
}
</script>

<script src="../auth.js"></script>
