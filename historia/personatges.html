<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personatges - Història</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        .his-nav { background: rgba(240,240,243, 0.85); backdrop-filter: blur(20px); padding: 12px 20px; display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; border-bottom: 1px solid var(--border-subtle); position: sticky; top: 0; z-index: 200; }
        [data-theme="dark"] .his-nav { background: rgba(9, 9, 11, 0.75); }
        .his-nav a { padding: 8px 16px; border-radius: var(--radius-full); color: var(--text-secondary); text-decoration: none; font-size: 0.82rem; font-weight: 500; }
        .his-nav a:hover { color: var(--text-primary); background: var(--bg-hover); }
        .his-nav a.active { background: var(--text-primary); color: var(--bg-base); font-weight: 600; }
        .his-nav a.home { color: #92400e; font-weight: 600; }

        .container { max-width: 820px; margin: 0 auto; padding: 24px 20px; }
        h1 { font-size: 1.6rem; text-align: center; margin-bottom: 6px; }
        h1 span { background: linear-gradient(135deg, #7c3aed, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { text-align: center; color: var(--text-secondary); font-size: 0.88rem; margin-bottom: 20px; }

        .era-picker { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 20px; }
        .era-btn { padding: 6px 12px; border-radius: var(--radius-full); border: 1px solid var(--border-subtle); background: var(--bg-raised); color: var(--text-secondary); font-weight: 600; cursor: pointer; font-size: 0.78rem; }
        .era-btn:hover { border-color: #7c3aed; color: #7c3aed; }
        .era-btn.active { background: #7c3aed; color: #fff; border-color: #7c3aed; }

        .fig-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
        .fig-card { background: var(--bg-raised); border-radius: var(--radius-lg); padding: 20px; border: 1px solid var(--border-subtle); transition: all 0.2s; }
        .fig-card:hover { border-color: #7c3aed; transform: translateY(-2px); }
        .fig-card .fig-emoji { font-size: 3rem; text-align: center; margin-bottom: 6px; }
        .fig-card h3 { color: #7c3aed; font-size: 1.05rem; margin-bottom: 4px; text-align: center; }
        .fig-card .dates { text-align: center; color: var(--text-muted); font-size: 0.78rem; margin-bottom: 10px; }
        .fig-card .intro { color: var(--text-secondary); font-size: 0.88rem; line-height: 1.6; margin-bottom: 10px; }
        .fig-card .fact { background: var(--bg-base); padding: 10px 12px; border-radius: 8px; border-left: 3px solid #7c3aed; font-size: 0.82rem; color: var(--text-secondary); line-height: 1.5; }
        .fig-card .fact::before { content: '✨ '; }

        .quiz-box { background: var(--bg-raised); border-radius: var(--radius-lg); border: 1px solid var(--border-subtle); padding: 24px; margin-top: 16px; }
        .quiz-box h2 { color: var(--text-primary); font-size: 1.05rem; margin-bottom: 14px; text-align: center; }
        .quiz-emoji { font-size: 4rem; text-align: center; margin-bottom: 8px; }
        .quiz-prompt { text-align: center; padding: 14px; background: var(--bg-base); border-radius: 10px; margin-bottom: 12px; color: var(--text-primary); font-weight: 600; }
        .quiz-opts { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .quiz-opt { padding: 12px; border-radius: 10px; border: 2px solid var(--border-subtle); background: var(--bg-base); cursor: pointer; font-weight: 600; color: var(--text-primary); font-size: 0.9rem; }
        .quiz-opt:hover { border-color: #7c3aed; }
        .quiz-opt.correct { background: rgba(34, 197, 94, 0.15); border-color: #22c55e; color: #16a34a; }
        .quiz-opt.wrong { background: rgba(239, 68, 68, 0.15); border-color: #ef4444; color: #dc2626; }
        .score { text-align: center; color: var(--text-secondary); font-size: 0.9rem; margin-top: 12px; }
    </style>
</head>
<body>

<div class="his-nav">
    <a href="../index.html" class="home">&#8592; Cursos</a>
    <a href="index.html">Inici</a>
    <a href="timeline.html">Línia del temps</a>
    <a href="periodes.html">Períodes</a>
    <a href="personatges.html" class="active">Personatges</a>
</div>

<div class="container">
    <h1><span>Personatges</span> històrics</h1>
    <p class="subtitle">20 figures que han canviat el món. Filtra per edat o fes el quiz.</p>

    <div class="era-picker" id="era"></div>
    <div id="figGrid"></div>

    <div class="quiz-box">
        <h2>&#x1F3AF; Endevina qui és</h2>
        <div class="quiz-emoji" id="qE"></div>
        <div class="quiz-prompt" id="qP"></div>
        <div class="quiz-opts" id="qO"></div>
        <div class="score" id="sc">Encerts: 0 &bull; Errors: 0</div>
    </div>
</div>

<script src="../theme.js"></script>
<script src="../auth.js"></script>
<script>
const FIGS = [
    { emoji: '👑', name: 'Cleòpatra', era: 'antiga', dates: '69-30 aC', intro: 'Última reina d\'Egipte. Famosa per la seva bellesa, intel·ligència i política.', fact: 'Parlava 9 idiomes i era la primera de la seva dinastia que aprenia egipci.' },
    { emoji: '⚔️', name: 'Juli Cèsar', era: 'antiga', dates: '100-44 aC', intro: 'General i dictador romà que va conquistar les Gàl·lies.', fact: 'Va ser assassinat al Senat per 23 punyalades ("Tu quoque, Brute?").' },
    { emoji: '📚', name: 'Aristòtil', era: 'antiga', dates: '384-322 aC', intro: 'Filòsof grec, alumne de Plató i tutor d\'Alexandre Magne.', fact: 'Va escriure sobre física, biologia, ètica, política... Base del pensament occidental.' },
    { emoji: '🛡️', name: 'Alexandre Magne', era: 'antiga', dates: '356-323 aC', intro: 'Rei macedoni que va conquistar un imperi de Grècia fins a l\'Índia.', fact: 'Als 30 anys tenia l\'imperi més gran del món antic. Va morir als 32.' },
    { emoji: '✝️', name: 'Carlemany', era: 'mitjana', dates: '742-814', intro: 'Rei dels francs. Va unificar gran part d\'Europa i va ser coronat emperador el 800.', fact: 'No sabia escriure bé, però promovia l\'educació i la cultura.' },
    { emoji: '🗡️', name: 'Joana d\'Arc', era: 'mitjana', dates: '1412-1431', intro: 'Noia francesa de 17 anys que va liderar l\'exèrcit contra els anglesos.', fact: 'Va ser cremada a la foguera als 19 anys. Segles després, l\'Església la va fer santa.' },
    { emoji: '⚓', name: 'Cristòfol Colom', era: 'moderna', dates: '1451-1506', intro: 'Navegant genovès que va arribar a Amèrica el 1492 pensant que era Àsia.', fact: 'Va fer 4 viatges i mai va saber que havia descobert un nou continent.' },
    { emoji: '🎨', name: 'Leonardo Da Vinci', era: 'moderna', dates: '1452-1519', intro: 'Pintor, inventor, científic i enginyer italià. Icona del Renaixement.', fact: 'Va dissenyar helicòpters, submarins i tancs 400 anys abans que existissin.' },
    { emoji: '👑', name: 'Isabel I d\'Anglaterra', era: 'moderna', dates: '1533-1603', intro: 'Reina d\'Anglaterra. El seu regnat es coneix com a "edat d\'or".', fact: 'No es va casar mai i va governar sola 44 anys. La van anomenar "la Reina Verge".' },
    { emoji: '🔭', name: 'Galileu Galilei', era: 'moderna', dates: '1564-1642', intro: 'Astrònom italià que va defensar que la Terra gira al voltant del Sol.', fact: 'L\'Església el va condemnar. Va haver d\'abjurar per no morir cremat.' },
    { emoji: '🌍', name: 'Isaac Newton', era: 'moderna', dates: '1643-1727', intro: 'Científic anglès que va descobrir la llei de la gravitació universal.', fact: 'Diu la llegenda que una poma que va caure d\'un arbre li va donar la idea.' },
    { emoji: '⚔️', name: 'Napoleó Bonaparte', era: 'contemporania', dates: '1769-1821', intro: 'General francès que va conquistar gran part d\'Europa. Es va coronar emperador.', fact: 'Era relativament alt per l\'època (1,68 m). El mite del "Napoleó baixet" ve d\'una campanya de propaganda anglesa.' },
    { emoji: '✊', name: 'Mahatma Gandhi', era: 'contemporania', dates: '1869-1948', intro: 'Líder indi que va aconseguir la independència del Regne Unit mitjançant la no-violència.', fact: 'Va inspirar Martin Luther King i Nelson Mandela.' },
    { emoji: '🧪', name: 'Marie Curie', era: 'contemporania', dates: '1867-1934', intro: 'Científica polonesa-francesa. Pionera en radioactivitat. Primera dona a guanyar un Nobel (i l\'única en guanyar-ne dos de diferents disciplines).', fact: 'Els seus quaderns encara són radioactius i es guarden en contenidors de plom.' },
    { emoji: '💡', name: 'Albert Einstein', era: 'contemporania', dates: '1879-1955', intro: 'Físic alemany. Creador de la teoria de la relativitat. E=mc².', fact: 'No va parlar fins als 4 anys. Més tard va guanyar el Nobel de Física (1921).' },
    { emoji: '🦸', name: 'Winston Churchill', era: 'contemporania', dates: '1874-1965', intro: 'Primer ministre britànic durant la Segona Guerra Mundial.', fact: 'Va guanyar el Nobel de Literatura el 1953 pels seus llibres d\'història.' },
    { emoji: '🚀', name: 'Neil Armstrong', era: 'contemporania', dates: '1930-2012', intro: 'Astronauta nord-americà. Primer humà a trepitjar la Lluna (20 juliol 1969).', fact: '"Un petit pas per a un home, un gran salt per a la humanitat."' },
    { emoji: '🌈', name: 'Nelson Mandela', era: 'contemporania', dates: '1918-2013', intro: 'Líder sud-africà contra l\'apartheid. Va passar 27 anys a la presó. President de Sud-àfrica.', fact: 'Als 9 anys, li van posar el nom "Nelson" un mestre a l\'escola.' },
    { emoji: '🎨', name: 'Pablo Picasso', era: 'contemporania', dates: '1881-1973', intro: 'Pintor espanyol, cofundador del cubisme. Una de les figures artístiques més influents del segle XX.', fact: 'A 12 anys ja pintava millor que molts adults professionals.' },
    { emoji: '🎭', name: 'William Shakespeare', era: 'moderna', dates: '1564-1616', intro: 'Dramaturg anglès. Autor de Hamlet, Romeu i Julieta, Macbeth.', fact: 'Va inventar més de 1.700 paraules angleses que s\'utilitzen avui.' }
];

let currentEra = 'all';
let correct = 0, wrong = 0;

function renderEra() {
    const e = document.getElementById('era');
    const eras = [['all', '👥 Tots'], ['antiga', '🏛️ Antiga'], ['mitjana', '🏰 Mitjana'], ['moderna', '⛵ Moderna'], ['contemporania', '🏭 Contemporània']];
    e.innerHTML = '';
    eras.forEach(([k, l]) => {
        const b = document.createElement('button');
        b.className = 'era-btn' + (k === currentEra ? ' active' : '');
        b.textContent = l;
        b.onclick = () => { currentEra = k; render(); };
        e.appendChild(b);
    });
}

function render() {
    renderEra();
    const list = currentEra === 'all' ? FIGS : FIGS.filter(f => f.era === currentEra);
    document.getElementById('figGrid').innerHTML = `
        <div class="fig-grid">
            ${list.map(f => `
                <div class="fig-card">
                    <div class="fig-emoji">${f.emoji}</div>
                    <h3>${f.name}</h3>
                    <div class="dates">${f.dates}</div>
                    <p class="intro">${f.intro}</p>
                    <div class="fact">${f.fact}</div>
                </div>
            `).join('')}
        </div>
    `;
}

function newQuiz() {
    const f = FIGS[Math.floor(Math.random() * FIGS.length)];
    const others = FIGS.filter(x => x.name !== f.name).sort(() => Math.random() - 0.5).slice(0, 3);
    const pool = [...others, f].sort(() => Math.random() - 0.5);

    document.getElementById('qE').textContent = f.emoji;
    document.getElementById('qP').textContent = f.intro;
    const o = document.getElementById('qO');
    o.innerHTML = '';
    pool.forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'quiz-opt';
        btn.textContent = p.name;
        btn.onclick = () => {
            if (p.name === f.name) { btn.classList.add('correct'); correct++; setTimeout(newQuiz, 900); }
            else { btn.classList.add('wrong'); wrong++; }
            document.getElementById('sc').textContent = `Encerts: ${correct} • Errors: ${wrong}`;
        };
        o.appendChild(btn);
    });
}

render();
newQuiz();
</script>
</body>
</html>
