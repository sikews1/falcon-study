<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Món - Geografia</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        .geo-nav { background: rgba(240,240,243, 0.85); backdrop-filter: blur(20px); padding: 12px 20px; display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; border-bottom: 1px solid var(--border-subtle); position: sticky; top: 0; z-index: 200; }
        [data-theme="dark"] .geo-nav { background: rgba(9, 9, 11, 0.75); }
        .geo-nav a { padding: 8px 16px; border-radius: var(--radius-full); color: var(--text-secondary); text-decoration: none; font-size: 0.82rem; font-weight: 500; }
        .geo-nav a:hover { color: var(--text-primary); background: var(--bg-hover); }
        .geo-nav a.active { background: var(--text-primary); color: var(--bg-base); font-weight: 600; }
        .geo-nav a.home { color: #0891b2; font-weight: 600; }

        .container { max-width: 900px; margin: 0 auto; padding: 24px 20px; }
        h1 { font-size: 1.6rem; text-align: center; margin-bottom: 6px; }
        h1 span { background: linear-gradient(135deg, #0891b2, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { text-align: center; color: var(--text-secondary); font-size: 0.88rem; margin-bottom: 20px; }

        .tabs { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
        .tab-btn { padding: 8px 14px; border-radius: var(--radius-full); border: 1px solid var(--border-subtle); background: var(--bg-raised); color: var(--text-secondary); font-weight: 600; cursor: pointer; font-size: 0.82rem; }
        .tab-btn:hover { border-color: #0891b2; color: #0891b2; }
        .tab-btn.active { background: #0891b2; color: #fff; border-color: #0891b2; }

        .continents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }
        .continent-card { background: var(--bg-raised); border-radius: 12px; padding: 18px; border: 1px solid var(--border-subtle); }
        .continent-card h3 { color: #0891b2; margin-bottom: 8px; font-size: 1.05rem; }
        .continent-card h3 .emoji { margin-right: 6px; font-size: 1.3rem; }
        .continent-card p { color: var(--text-secondary); font-size: 0.85rem; line-height: 1.6; margin-bottom: 8px; }
        .continent-card .facts { display: grid; gap: 4px; font-size: 0.82rem; }
        .continent-card .facts span { color: var(--text-secondary); }
        .continent-card .facts span strong { color: var(--text-primary); }

        .quiz-box { background: var(--bg-raised); border-radius: var(--radius-lg); border: 1px solid var(--border-subtle); padding: 24px; }
        .quiz-box h2 { color: var(--text-primary); font-size: 1.1rem; margin-bottom: 14px; text-align: center; }
        .quiz-prompt { text-align: center; padding: 16px; background: var(--bg-base); border-radius: 10px; margin-bottom: 12px; color: var(--text-primary); font-weight: 600; font-size: 1.05rem; }
        .quiz-prompt .big-flag { font-size: 3.5rem; display: block; margin-bottom: 6px; }
        .quiz-opts { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .quiz-opt { padding: 12px; border-radius: 10px; border: 2px solid var(--border-subtle); background: var(--bg-base); cursor: pointer; font-weight: 600; color: var(--text-primary); font-size: 0.92rem; }
        .quiz-opt:hover { border-color: #0891b2; }
        .quiz-opt.correct { background: rgba(34, 197, 94, 0.15); border-color: #22c55e; color: #16a34a; }
        .quiz-opt.wrong { background: rgba(239, 68, 68, 0.15); border-color: #ef4444; color: #dc2626; }
        .score { text-align: center; color: var(--text-secondary); font-size: 0.9rem; margin-top: 12px; }
    </style>
</head>
<body>

<div class="geo-nav">
    <a href="../index.html" class="home">&#8592; Cursos</a>
    <a href="index.html">Inici</a>
    <a href="espanya.html">Espanya</a>
    <a href="europa.html">Europa</a>
    <a href="mon.html" class="active">Món</a>
    <a href="fisic.html">Físic</a>
</div>

<div class="container">
    <h1><span>El Món</span></h1>
    <p class="subtitle">Continents, països destacats i capitals del món</p>

    <div class="tabs">
        <button class="tab-btn active" onclick="show('cont')">Continents</button>
        <button class="tab-btn" onclick="show('quiz')">Quiz de capitals</button>
    </div>

    <div id="content"></div>
</div>

<script src="../theme.js"></script>
<script src="../auth.js"></script>
<script>
const CONTINENTS = [
    { emoji: '🌍', name: 'Europa', desc: 'Continent petit però molt poblat. 50 països aprox.', pop: '750 milions', biggest: 'Rússia', notable: '🇫🇷 França, 🇩🇪 Alemanya, 🇮🇹 Itàlia, 🇪🇸 Espanya' },
    { emoji: '🌍', name: 'Àfrica', desc: '54 països. Continent amb la major diversitat humana.', pop: '1.400 milions', biggest: 'Algèria (superfície)', notable: '🇪🇬 Egipte, 🇳🇬 Nigèria, 🇿🇦 Sud-àfrica, 🇲🇦 Marroc' },
    { emoji: '🌏', name: 'Àsia', desc: 'El continent més gran i poblat del món. 48 països.', pop: '4.700 milions', biggest: 'Xina', notable: '🇨🇳 Xina, 🇯🇵 Japó, 🇮🇳 Índia, 🇰🇷 Corea del Sud' },
    { emoji: '🌎', name: 'Amèrica del Nord', desc: 'Des del Canadà fins a Panamà. 23 països.', pop: '580 milions', biggest: 'Canadà', notable: '🇺🇸 EUA, 🇨🇦 Canadà, 🇲🇽 Mèxic' },
    { emoji: '🌎', name: 'Amèrica del Sud', desc: '12 països. Conté la selva amazònica.', pop: '430 milions', biggest: 'Brasil', notable: '🇧🇷 Brasil, 🇦🇷 Argentina, 🇨🇴 Colòmbia, 🇨🇱 Xile' },
    { emoji: '🌏', name: 'Oceania', desc: 'Austràlia + illes del Pacífic. 14 països.', pop: '45 milions', biggest: 'Austràlia', notable: '🇦🇺 Austràlia, 🇳🇿 Nova Zelanda' },
    { emoji: '❄️', name: 'Antàrtida', desc: 'Sense països. Només bases científiques.', pop: '1.000-4.000 (estacional)', biggest: 'Cap país', notable: 'Només pingüins i científics' }
];

const WORLD_CAPITALS = [
    { flag: '🇨🇳', country: 'Xina', cap: 'Pequín' },
    { flag: '🇯🇵', country: 'Japó', cap: 'Tòquio' },
    { flag: '🇮🇳', country: 'Índia', cap: 'Nova Delhi' },
    { flag: '🇺🇸', country: 'Estats Units', cap: 'Washington DC' },
    { flag: '🇨🇦', country: 'Canadà', cap: 'Ottawa' },
    { flag: '🇲🇽', country: 'Mèxic', cap: 'Ciutat de Mèxic' },
    { flag: '🇧🇷', country: 'Brasil', cap: 'Brasília' },
    { flag: '🇦🇷', country: 'Argentina', cap: 'Buenos Aires' },
    { flag: '🇨🇱', country: 'Xile', cap: 'Santiago' },
    { flag: '🇵🇪', country: 'Perú', cap: 'Lima' },
    { flag: '🇨🇴', country: 'Colòmbia', cap: 'Bogotà' },
    { flag: '🇪🇬', country: 'Egipte', cap: 'El Caire' },
    { flag: '🇿🇦', country: 'Sud-àfrica', cap: 'Pretòria' },
    { flag: '🇳🇬', country: 'Nigèria', cap: 'Abuja' },
    { flag: '🇲🇦', country: 'Marroc', cap: 'Rabat' },
    { flag: '🇰🇪', country: 'Kenya', cap: 'Nairobi' },
    { flag: '🇦🇺', country: 'Austràlia', cap: 'Canberra' },
    { flag: '🇳🇿', country: 'Nova Zelanda', cap: 'Wellington' },
    { flag: '🇰🇷', country: 'Corea del Sud', cap: 'Seül' },
    { flag: '🇹🇭', country: 'Tailàndia', cap: 'Bangkok' },
    { flag: '🇻🇳', country: 'Vietnam', cap: 'Hanoi' },
    { flag: '🇸🇦', country: 'Aràbia Saudita', cap: 'Riad' },
    { flag: '🇮🇱', country: 'Israel', cap: 'Jerusalem' },
    { flag: '🇷🇺', country: 'Rússia', cap: 'Moscou' }
];

let correct = 0, wrong = 0;

function show(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    event?.target?.classList?.add('active');
    const c = document.getElementById('content');
    if (tab === 'cont') {
        c.innerHTML = `
            <div class="continents-grid">
                ${CONTINENTS.map(k => `
                    <div class="continent-card">
                        <h3><span class="emoji">${k.emoji}</span>${k.name}</h3>
                        <p>${k.desc}</p>
                        <div class="facts">
                            <span><strong>Població:</strong> ${k.pop}</span>
                            <span><strong>País més gran:</strong> ${k.biggest}</span>
                            <span><strong>Països notables:</strong> ${k.notable}</span>
                        </div>
                    </div>
                `).join('')}
            </div>
            <p style="text-align:center;color:var(--text-secondary);font-size:0.85rem;margin-top:14px;">Hi ha <strong>7 continents</strong> (segons el model europeu). En altres models n'hi ha 5 o 6 depenent de si es compten Europa i Àsia com un de sol (Euràsia) o si es divideix Amèrica.</p>
        `;
    } else {
        c.innerHTML = `
            <div class="quiz-box">
                <h2>&#x1F3AF; Quiz de capitals del món</h2>
                <div class="quiz-prompt" id="qP"></div>
                <div class="quiz-opts" id="qO"></div>
                <div class="score" id="sc">Encerts: ${correct} &bull; Errors: ${wrong}</div>
            </div>
        `;
        newQuiz();
    }
}

function newQuiz() {
    const item = WORLD_CAPITALS[Math.floor(Math.random() * WORLD_CAPITALS.length)];
    const others = WORLD_CAPITALS.filter(w => w.country !== item.country).sort(() => Math.random() - 0.5).slice(0, 3);
    const pool = [...others, item].sort(() => Math.random() - 0.5);
    document.getElementById('qP').innerHTML = `<span class="big-flag">${item.flag}</span>Quina és la capital de ${item.country}?`;
    const o = document.getElementById('qO');
    o.innerHTML = '';
    pool.forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'quiz-opt';
        btn.textContent = p.cap;
        btn.onclick = () => {
            if (p.country === item.country) { btn.classList.add('correct'); correct++; setTimeout(newQuiz, 800); }
            else { btn.classList.add('wrong'); wrong++; }
            document.getElementById('sc').textContent = `Encerts: ${correct} • Errors: ${wrong}`;
        };
        o.appendChild(btn);
    });
}

const urlMode = new URLSearchParams(location.search).get('mode');
show(urlMode === 'advanced' ? 'quiz' : 'cont');
</script>
</body>
</html>
